<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Chain</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1e1e1e;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }
      #root { width: 100vw; height: 100vh; }
      .spinner {
        width: 32px; height: 32px;
        border: 3px solid #333;
        border-top-color: #4a9eff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .react-flow__node { cursor: pointer; }
      .react-flow__controls { background: #2a2a2a; border: 1px solid #444; border-radius: 6px; }
      .react-flow__controls-button { background: #2a2a2a; border-bottom: 1px solid #444; fill: #ccc; }
      .react-flow__controls-button:hover { background: #333; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
